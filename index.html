<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Special Surprise 🎂</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       PAGE 1 — Entry / Countdown
  ══════════════════════════════════════════ -->
  <div id="page-entry" class="page active">
    <div class="floating-hearts" id="floatingHearts"></div>
    <div class="entry-card">
      <div class="lock-icon">🎁</div>
      <h1 class="entry-title">Something Special<br/><span>Awaits You…</span></h1>

      <div class="input-group">
        <label for="nameInput">Your Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Priya" autocomplete="off"/>
      </div>

      <div class="input-group">
        <label for="dobInput">Your Date of Birth</label>
        <input type="date" id="dobInput"/>
      </div>

      <!-- Countdown target — set this to the birthday moment -->
      <div class="countdown-wrap" id="countdownWrap">
        <p class="countdown-label">Unlocks in</p>
        <div class="countdown-boxes">
          <div class="cb"><span id="cdDays">00</span><small>Days</small></div>
          <div class="cb"><span id="cdHours">00</span><small>Hours</small></div>
          <div class="cb"><span id="cdMins">00</span><small>Mins</small></div>
          <div class="cb"><span id="cdSecs">00</span><small>Secs</small></div>
        </div>
      </div>

      <button id="okBtn" class="ok-btn" disabled>🎉 Open My Surprise</button>
      <p class="hint-text" id="hintText">Fill in your name and birthday to unlock ✨</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       PAGE 2 — Photo Slideshow
  ══════════════════════════════════════════ -->
  <div id="page-photos" class="page">
    <div class="photo-bg-blur" id="photoBgBlur"></div>
    <div class="photo-counter" id="photoCounter">1 / 20</div>
    <div class="slide-name" id="slideName"></div>

    <div class="slideshow-wrap">
      <div class="slide-frame" id="slideFrame">
        <!-- slides injected by JS -->
      </div>
    </div>

    <div class="slide-dots" id="slideDots"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <!-- ══════════════════════════════════════════
       PAGE 3 — Final Message
  ══════════════════════════════════════════ -->
  <div id="page-final" class="page">
    <div class="final-bg" id="finalBg"></div>
    <div class="final-overlay"></div>
    <div class="final-content">
      <div class="balloons" id="balloons"></div>
      <h2 class="final-wish" id="finalWish">Happy Birthday! 🎂</h2>
      <div class="message-box">
        <p class="message-text" id="messageText"></p>
      </div>
      <div class="signature">With love 💖</div>
      <div class="confetti-container" id="confetti"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
